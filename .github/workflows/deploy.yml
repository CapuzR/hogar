name: Deploy hogar

# Push a main -> deploya SOLO los workers cuya carpeta cambio.
# "Run workflow" (workflow_dispatch) -> deploya TODOS (util para el primer deploy).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hogar
  cancel-in-progress: false

env:
  # El account_id NO es secreto (sale en la URL del dashboard).
  CLOUDFLARE_ACCOUNT_ID: ff4771186ee248e2186f7952ae4ce944

jobs:
  workers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: fetch-exchange-rate,                  dir: finanzas/workers/fetch-exchange-rate }
          - { name: write-ynab-transaction,               dir: finanzas/workers/write-ynab-transaction }
          - { name: sync-ynab-meta,                       dir: finanzas/workers/sync-ynab-meta }
          - { name: notion-upsert-expense,                dir: finanzas/workers/notion-upsert-expense }
          - { name: ynab-export-csv,                      dir: finanzas/workers/ynab-export-csv }
          - { name: init-notion-schema,                   dir: finanzas/workers/init-notion-schema }
          - { name: reconcile-bank-statement,             dir: finanzas/workers/reconcile-bank-statement }
          - { name: notion-upsert-fertilidad-medicamento, dir: fertilidad/workers/notion-upsert-fertilidad-medicamento }
          - { name: notion-upsert-fertilidad-lab-value,   dir: fertilidad/workers/notion-upsert-fertilidad-lab-value }
          - { name: notion-upsert-fertilidad-sesion,      dir: fertilidad/workers/notion-upsert-fertilidad-sesion }
          - { name: notion-upsert-fertilidad-ciclo,       dir: fertilidad/workers/notion-upsert-fertilidad-ciclo }
          - { name: init-notion-fertilidad-schema,        dir: fertilidad/workers/init-notion-fertilidad-schema }
          # PENDIENTE fertilidad-overlay: falta declarar el KV OVERLAY_KV en su wrangler.toml.
          # Descomentar cuando el binding este puesto (si no, el deploy le quita el KV):
          # - { name: fertilidad-overlay, dir: fertilidad/workers/fertilidad-overlay }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesario para el diff contra el commit anterior

      - name: Cambio ${{ matrix.name }}?
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          base="${{ github.event.before }}"
          if ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"; exit 0   # base desconocida -> deploya por seguridad
          fi
          if git diff --name-only "$base" "${{ github.sha }}" | grep -q "^${{ matrix.dir }}/"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy ${{ matrix.name }}
        if: steps.changed.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.dir }}
          # --keep-vars: NO borra las vars/secrets que ya estan puestas en el dashboard.
          command: deploy --keep-vars

  # ---------------------------------------------------------------------------
  # App mantenimiento-carro: requiere crear la D1 real primero
  # (wrangler d1 create mantenimiento -> pegar el id en mantenimiento-carro/wrangler.jsonc).
