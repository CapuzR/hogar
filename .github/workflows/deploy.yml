name: Deploy hogar

# Push a main -> deploya SOLO lo que cambio (workers y/o app).
# "Run workflow" (workflow_dispatch) -> deploya TODO.
#
# Diseno: el job 'deploy' recorre los workers en UN solo job (no un matrix de 13),
# porque GitHub redondea cada JOB al minuto entero: un matrix facturaria ~13 min por
# push aunque cambie 1 worker. Aqui son ~1-2 min. Repo privado Free = 2.000 min/mes.
on:
  push:
    branches: [main]
    paths:
      - 'finanzas/workers/**'
      - 'fertilidad/workers/**'
  workflow_dispatch:

concurrency:
  group: deploy-hogar
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  # El account_id NO es secreto (sale en la URL del dashboard).
  CLOUDFLARE_ACCOUNT_ID: ff4771186ee248e2186f7952ae4ce944

jobs:
  # ---- Workers (finanzas + fertilidad): single-file, sin build ----
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historia completa para el diff contra el commit anterior

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar wrangler (una vez, no por-worker)
        run: npm i -g wrangler@4.40.0

      - name: Deploy de los workers que cambiaron
        shell: bash
        run: |
          set -uo pipefail   # sin -e: un deploy fallido NO debe matar el loop
          WORKERS=(
            finanzas/workers/fetch-exchange-rate
            finanzas/workers/write-ynab-transaction
            finanzas/workers/sync-ynab-meta
            finanzas/workers/notion-upsert-expense
            finanzas/workers/ynab-export-csv
            finanzas/workers/init-notion-schema
            finanzas/workers/reconcile-bank-statement
            fertilidad/workers/fertilidad-overlay
            fertilidad/workers/notion-upsert-fertilidad-medicamento
            fertilidad/workers/notion-upsert-fertilidad-lab-value
            fertilidad/workers/notion-upsert-fertilidad-sesion
            fertilidad/workers/notion-upsert-fertilidad-ciclo
            fertilidad/workers/init-notion-fertilidad-schema
          )

          ALL=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then ALL=true; fi
          BASE="${{ github.event.before }}"
          if [ "$ALL" != "true" ] && ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            ALL=true   # primer push / base desconocida -> deploya todo por seguridad
          fi

          rc=0
          failed=()
          for dir in "${WORKERS[@]}"; do
            changed=false
            if [ "$ALL" = "true" ]; then
              changed=true
            elif ! git diff --quiet "$BASE" "${{ github.sha }}" -- "$dir/"; then
              changed=true
            fi
            if [ "$changed" != "true" ]; then
              echo "- skip $dir (sin cambios)"
              continue
            fi
            echo "::group::deploy $dir"
            if ( cd "$dir" && wrangler deploy --keep-vars ); then
              echo "OK $dir"
            else
              echo "::error::fallo el deploy de $dir"
              failed+=("$dir")
              rc=1
            fi
            echo "::endgroup::"
          done

          if [ "$rc" -ne 0 ]; then
            echo "Workers que fallaron: ${failed[*]}"
          fi
          exit $rc

  # ---- App mantenimiento-carro (Hono + D1 + SPA Vite): con build ----
  # SOLO se deploya a mano (workflow_dispatch / "Run workflow"), NO en cada push:
  # cada deploy corre migraciones + seed contra la D1 de PRODUCCION, asi que es
  # una decision deliberada. El typecheck/build es la puerta: si no compila, no toca prod.
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy de la app? (solo a mano)
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "La app se deploya a mano con Run workflow; en push se salta."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.changed.outputs.go == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mantenimiento-carro/package-lock.json

      - name: Build + migraciones + seed + deploy
        if: steps.changed.outputs.go == 'true'
        working-directory: mantenimiento-carro
        run: |
          npm ci
          npm run typecheck
          npm run build
          npx wrangler d1 migrations apply mantenimiento --remote
          npm run db:seed:remote
          npx wrangler deploy
