<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#079aae" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a1418" media="(prefers-color-scheme: dark)" />
    <title>Mantenimiento · Optra & Clio</title>
    <!-- Aplica el tema ANTES de pintar para evitar el flash claro→oscuro. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var dark = t === "dark" || ((!t || t === "system") && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
